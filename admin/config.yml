backend:
  name: git-gateway
  branch: main

locale: fr

# Dossier global pour les médias (images)
media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Articles de Blog"
    media_folder: "images/blog"
    public_folder: "/images/blog"
    files:
      - label: "Gérer tous les articles"
        name: "posts"
        file: "data/posts.json"
        fields:
          - label: "Articles"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - label: "Identifiant unique"
                name: "id"
                widget: "string"
                hint: "Nombre unique, ex: 3, 4, 5..."
              - label: "Titre de l'article"
                name: "title"
                widget: "string"
              - label: "Slug (URL de l'article)"
                name: "slug"
                widget: "string"
                hint: "Sans espaces ni accents. Ex: entretenir-pelouse-ete"
                pattern: ['^[a-z0-9-]+$', "Uniquement des lettres minuscules, chiffres et tirets"]
              - label: "Date de publication"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                time_format: false
              - label: "Catégorie"
                name: "category"
                widget: "select"
                options: ["Entretien", "Création", "Élagage", "Conseils"]
              - label: "Image principale"
                name: "image"
                widget: "image"
                required: false
                default: "/images/EasyGarden_Tonte.webp"
              - label: "Résumé (affiché dans la liste)"
                name: "excerpt"
                widget: "text"
                hint: "2-3 phrases max"
              - label: "Contenu de l'article"
                name: "content"
                widget: "markdown"
              - label: "Publié"
                name: "published"
                widget: "boolean"
                default: true
              - label: "Auteur"
                name: "author"
                widget: "string"
                default: "Easy Garden"

  - name: "gestion_site"
    label: "Gestion du Site"
    files:

      - file: "data/accueil.json"
        label: "Page : Accueil"
        name: "accueil"
        fields:
          - {label: "Image d'en-tête (Hero)", name: "hero_image", widget: "image"}
          - {label: "Surtitre", name: "hero_sur_title", widget: "string", default: "Création & Entretien dans le Hainaut"}
          - {label: "Titre principal", name: "hero_title", widget: "string", hint: "Vous pouvez utiliser la balise <br> pour un retour à la ligne."}
          - {label: "Sous-titre", name: "hero_subtitle", widget: "text"}
          - {label: "Citation (Vision)", name: "vision_quote", widget: "text"}
          - {label: "Texte de la vision", name: "vision_text", widget: "text", hint: "Vous pouvez utiliser <strong>texte</strong> pour mettre en gras."}

          - label: "Section Services (Accueil)"
            name: "services_accueil"
            widget: "object"
            fields:
              - {label: "Image Création", name: "img_creation", widget: "image"}
              - {label: "Image Entretien", name: "img_entretien", widget: "image"}
              - {label: "Image Élagage", name: "img_elagage", widget: "image"}

          - label: "Section Portfolio (Accueil)"
            name: "portfolio_accueil"
            widget: "object"
            fields:
              - {label: "Image de fond portfolio", name: "bg_image", widget: "image"}
              - {label: "Miniature 1", name: "img_1", widget: "image"}
              - {label: "Miniature 2", name: "img_2", widget: "image"}
              - {label: "Miniature 3", name: "img_3", widget: "image"}

      - file: "data/services.json"
        label: "Page : Services"
        name: "services_page"
        fields:
          - {label: "Titre principal de la page", name: "page_title", widget: "string"}
          - {label: "Sous-titre de la page", name: "page_subtitle", widget: "text"}
          - label: "Liste des services détaillés"
            name: "services_list"
            widget: "list"
            fields:
              - {label: "Numéro", name: "number", widget: "string", hint: "Ex: 01, 02"}
              - {label: "Titre du service", name: "title", widget: "string"}
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Description courte", name: "description", widget: "text"}
              - label: "Points forts (liste à puces)"
                name: "features"
                widget: "list"
                field: {label: "Point", name: "point", widget: "string"}

      - file: "data/contact.json"
        label: "Page : Contact"
        name: "contact"
        fields:
          - {label: "Titre principal", name: "page_title", widget: "string"}
          - {label: "Texte d'introduction", name: "intro_text", widget: "text"}
          - {label: "Numéro de téléphone", name: "phone", widget: "string"}
          - {label: "Adresse Email", name: "email", widget: "string"}
          - {label: "Localité", name: "address", widget: "string"}
          - {label: "Zone d'intervention", name: "zone", widget: "string"}
          - {label: "Lien Facebook", name: "facebook_url", widget: "string"}

      - file: "data/realisations.json"
        label: "Portfolio (Réalisations)"
        name: "realisations"
        media_folder: "images/realisations"
        public_folder: "/images/realisations"
        fields:
          - label: "Liste de tes chantiers"
            name: "projets"
            widget: "list"
            fields:
              - {label: "Titre du projet", name: "title", widget: "string"}
              - {label: "Catégorie", name: "category", widget: "select", options: ["Création", "Entretien", "Abattage", "Aménagement"]}
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Description courte", name: "description", widget: "text"}

      - file: "data/images_globales.json"
        label: "Paramètres Globaux & Logo"
        name: "images_globales"
        media_folder: "images/globales"
        public_folder: "/images/globales"
        fields:
          - {label: "Logo du site", name: "logo", widget: "image"}
          - {label: "Email global de contact", name: "global_email", widget: "string", default: "easygarden.devis@gmail.com"}
          - {label: "Téléphone global", name: "global_phone", widget: "string", default: "+32493824581"}
          - {label: "Image page Services (Hero)", name: "hero_services", widget: "image", required: false}
          - {label: "Image page Contact (Hero)", name: "hero_contact", widget: "image", required: false}