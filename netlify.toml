[build]
  publish = "."
 
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
 
[[redirects]]
  from = "/stats"
  to = "/stats.html"
  status = 200
 
 [[redirects]]
  from = "/blog/:slug"
  to = "/blog/article.html?slug=:slug"
  status = 200

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
 
[[headers]]
  for = "/admin/*"
    [headers.values]
    X-Robots-Tag = "noindex, nofollow"
 
[[headers]]
  for = "/stats.html"
    [headers.values]

[build]
  publish = "."
  command = "node generate-sitemap.js"