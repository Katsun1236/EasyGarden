      "@context": "https://schema.org",

      "itemListElement": [

        {"@type": "ListItem", "position": 2, "name": "Réalisations", "item": "https://easy-garden.netlify.app/realisations.html"}
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .gallery-item { transition: opacity 0.4s, transform 0.4s; }
        .gallery-item.hidden-item { opacity: 0; pointer-events: none; position: absolute; }
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; }
    </style>
</head>
<body class="font-sans text-stone-800 bg-stone-50 antialiased selection:bg-botanic selection:text-white">

<!-- HEADER -->

    <section class="page-hero pt-36 pb-20 px-6">
        <div class="max-w-7xl mx-auto relative z-10">
            <nav class="breadcrumb mb-6" aria-label="Fil d'Ariane">
                <a href="/">Accueil</a><span>/</span><span class="current">Réalisations</span>
            </nav>
            <span class="uppercase tracking-[0.2em] text-sm text-botanic font-bold block mb-4">Portfolio</span>
            <h1 class="font-serif text-5xl md:text-7xl text-white leading-tight">Nos <br><span class="italic font-light text-botanic-light">Réalisations</span></h1>
            <p class="text-white/70 mt-6 text-lg font-light max-w-xl">Chaque jardin raconte une histoire. Découvrez nos créations et réalisations dans tout le Hainaut.</p>
        </div>
    </section>

    <section class="py-24 px-6 bg-stone-50">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-wrap justify-center gap-4 mb-12">
                <button class="filter-btn active" data-filter="all">Tous</button>
                <button class="filter-btn" data-filter="Création">Création</button>
                <button class="filter-btn" data-filter="Entretien">Entretien</button>
                <button class="filter-btn" data-filter="Abattage">Abattage</button>
                <button class="filter-btn" data-filter="Aménagement">Aménagement</button>
            </div>

            <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"> </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 relative" id="gallery"></div> 

            <div class="mt-16 p-8 bg-white border border-stone-200 text-center reveal">
                <p class="text-stone-600 font-light mb-4">Retrouvez encore plus de réalisations sur notre page Facebook</p>
                <a href="https://www.facebook.com/share/18K4bjzwpv/" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-3 text-[#1877F2] font-bold hover:underline">
                    <i class="fa-brands fa-facebook text-xl" aria-hidden="true"></i> Easy Garden sur Facebook
                </a>
            </div>
        </div>
    </section>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Agrandissement photo">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-3xl hover:text-botanic transition-colors focus:outline-none" aria-label="Fermer"><i class="fa-solid fa-times"></i></button>
        <img id="lightbox-img" src="" alt="" class="rounded-sm shadow-2xl">
    </div>

<!-- FOOTER -->

    <script src="/js/main.js"></script>
    <script>
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const filter = btn.dataset.filter;
                document.querySelectorAll('.gallery-item').forEach(item => {
                    if (filter === 'all' || item.dataset.category === filter) {
                        item.style.opacity = '1';
                        item.style.pointerEvents = 'auto';
                        item.style.position = 'relative';
                    } else {
                        item.style.opacity = '0';
                        item.style.pointerEvents = 'none';
                        item.style.position = 'absolute';
                    }
                });
            });
        });

        function openLightbox(src, alt) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-img').alt = alt;
            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
            // Focus trap
            const closeBtn = document.querySelector('#lightbox button');
            closeBtn.focus();
            lb.addEventListener('keydown', trapFocus);
        }
        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.classList.remove('active');
            document.body.style.overflow = '';
            lb.removeEventListener('keydown', trapFocus);
        }
        function trapFocus(e) {
            if (e.key === 'Tab') {
                const lb = document.getElementById('lightbox');
                const focusable = lb.querySelectorAll('button, [tabindex]:not([tabindex="-1"])');
                const first = focusable[0];
                const last = focusable[focusable.length - 1];
                if (e.shiftKey) {
                    if (document.activeElement === first) {
                        last.focus();
                        e.preventDefault();
                    }
                } else {
                    if (document.activeElement === last) {
                        first.focus();
                        e.preventDefault();
                    }
                }
            }
        }
        document.getElementById('lightbox').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeLightbox();
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

        document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('portfolio-grid');
        const filterBtns = document.querySelectorAll('.filter-btn');
        let tousLesProjets = []; 

        fetch('/data/realisations.json')
            .then(response => {
                if (!response.ok) throw new Error("Fichier JSON introuvable (Normal si la collection CMS est vide)");
                return response.json();
            })
            .then(data => {
                if (data && data.projets) {
                    tousLesProjets = data.projets;
                    afficherProjets(tousLesProjets);
                }
            })
            .catch(error => {
                console.warn("Info CMS :", error.message);
                grid.innerHTML = '<p class="text-gray-500 text-center col-span-full">Aucune réalisation pour le moment.</p>';
            });

        function afficherProjets(projets) {
            grid.innerHTML = ''; 
            
            if (projets.length === 0) {
                grid.innerHTML = '<p class="text-gray-500 text-center col-span-full">Aucun projet dans cette catégorie.</p>';
                return;
            }

            projets.forEach((projet, index) => {
                const delay = index % 3 === 0 ? '' : (index % 3 === 1 ? 'reveal-delay-1' : 'reveal-delay-2');
                
                const cardHTML = `
                    <div class="blog-card group reveal ${delay}">
                        <div class="relative h-64 overflow-hidden">
                            <img src="${projet.image}" alt="${projet.title}" class="img-zoom" loading="lazy">
                            <div class="absolute top-4 right-4">
                                <span class="category-badge bg-primary text-white shadow-sm">${projet.category}</span>
                            </div>
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <h3 class="text-xl font-playfair font-bold text-secondary mb-3">${projet.title}</h3>
                            <p class="text-gray-600 flex-grow">${projet.description}</p>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
            
            const observer = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        obs.unobserve(entry.target); 
                    }
                });
            }, { threshold: 0.12 });
            
            grid.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                const categorieFiltre = e.target.getAttribute('data-filter');
                if (categorieFiltre === 'all' || !categorieFiltre) {
                    afficherProjets(tousLesProjets);
                } else {
                    const projetsFiltres = tousLesProjets.filter(p => 
                        p.category && p.category.toLowerCase() === categorieFiltre.toLowerCase()
                    );
                    afficherProjets(projetsFiltres);
                }
            });
        });
    });

    </script>
</body>
</html>
